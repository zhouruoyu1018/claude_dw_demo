# ============================================================
# synonym.yaml - 贷款业务同义词词典
# ============================================================
# 用途: 将业务俗称(口语化表达)映射为 Hive 元数据中的标准术语,
#       供 search-hive-metadata skill 在搜索时自动扩展查询词,
#       提升 search_by_comment / search_table 的命中率。
#
# 格式: <业务俗称>: [<标准术语1>, <标准术语2>, ...]
#   - key: 用户可能输入的口语化业务词
#   - value: Hive 表/字段注释中实际出现的标准术语 + 英文缩写
#   - value 列表中应包含 key 自身(确保原词也被搜索)
#
# 维护说明:
#   - 新增同义词时按所属生命周期分组添加
#   - 英文缩写取自 search_word_root 词根表中的 english_abbr
#   - 定期与 Hive 表注释校对, 确保标准术语与实际元数据一致
# ============================================================

